<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gwalior Explore</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<div id="historyModal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <div class="modal-body">
            <img id="modalImg" src="" alt="">
            <h2 id="modalTitle"></h2>
            <p id="modalAddress"></p>
            <hr>
            <div id="modalFullHistory" class="full-history-text"></div>
        </div>
    </div>
</div>
<body>

    <!-- HERO SECTION -->

    <header class="hero-section">
    <div class="hero-content">
        <h1 class="main-title">GWALIOR EXPLORE <br>
    <span class="my-name">WITH SAIF KHAN</span></h1>
        <div class="title-underline"></div>
        <p class="sub-text">The Royal Legacy of Central India</p>
        <p class="description">
            Established in the 8th Century AD by Raja Suraj Sen, Gwalior became the royal home of the Scindia Dynasty and one of India’s greatest heritage cities.
        </p>
        <a href="#places" class="explore-btn">
            <span>Explore Heritage</span>
            <div class="btn-graphics"></div>
        </a>
    </div>
</header>

    <!-- PLACES SECTION -->

    <section id="places" class="places-section">

        <h2>Famous Places of Gwalior</h2>

        <div class="places-container" id="placesContainer">

            <!-- Dynamic Cards -->

        </div>

    </section>

    <!-- MODAL -->

    <div class="modal" id="modal">

        <div class="modal-content">

            <span class="close-btn" id="closeBtn">&times;</span>

            <img id="modalImg" src="" alt="">

            <h2 id="modalTitle"></h2>

            <p id="modalYear"></p>

            <p id="modalDesc"></p>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
